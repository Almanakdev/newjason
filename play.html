<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#08114d" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Poppins:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <title>Json Script Show — The Kiriko Vale Startup Story</title>
    <style>
      /* Nudge phone players to landscape — the game plays far better wide.
         Only shows on short portrait screens; hidden the moment they rotate. */
      #rotate-hint {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        text-align: center;
        padding: 32px;
        background: linear-gradient(180deg, #1734cf, #08114d);
        color: #eef1ff;
        font-family: 'Poppins', system-ui, sans-serif;
      }
      #rotate-hint .glyph {
        font-size: 52px;
        animation: rotate-nudge 1.8s ease-in-out infinite;
      }
      #rotate-hint strong { font-size: 18px; font-weight: 700; }
      #rotate-hint span { font-size: 13px; color: #9fadf0; max-width: 24ch; }
      @keyframes rotate-nudge {
        0%, 100% { transform: rotate(-12deg); }
        50% { transform: rotate(78deg); }
      }
      @media (orientation: portrait) and (max-width: 820px) {
        #rotate-hint { display: flex; }
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div id="ui-root"></div>
    <div id="rotate-hint" aria-hidden="true">
      <div class="glyph">📱</div>
      <strong>Rotate your device</strong>
      <span>Json Script Show plays best in landscape. Turn your phone sideways to begin.</span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
