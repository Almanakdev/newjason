        font-family="'Zen Kaku Gothic New','Yu Gothic','Hiragino Kaku Gothic ProN','Noto Sans SC','Noto Sans JP',sans-serif"
        font-size="140" font-weight="800" text-anchor="middle" dominant-baseline="central">码</text>
</svg>
