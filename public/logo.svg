<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="The Origin of JSON">
  <title>The Origin of JSON</title>

  <!-- gold plate -->
  <rect width="512" height="512" rx="104" fill="#f5a623"/>

  <!-- action / "pop" marks, upper right -->
  <g fill="#a86f12">
    <rect x="404" y="70"  width="22" height="66" rx="11" transform="rotate(18 415 103)"/>
    <rect x="442" y="104" width="22" height="62" rx="11" transform="rotate(48 453 135)"/>
    <rect x="452" y="152" width="22" height="56" rx="11" transform="rotate(78 463 180)"/>
  </g>

  <!-- black browser window -->
  <rect x="92" y="118" width="328" height="280" rx="40" fill="#26262b"/>

  <!-- title-bar dots -->
  <circle cx="138" cy="160" r="12" fill="#f5a623"/>
  <circle cx="174" cy="160" r="12" fill="#f5a623"/>
  <circle cx="210" cy="160" r="12" fill="#f5a623"/>
