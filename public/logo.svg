    <path d="M196 232 q-26 0 -26 31 v17 q0 25 -22 25 q22 0 22 25 v17 q0 31 26 31"/>
    <path d="M356 232 q26 0 26 31 v17 q0 25 22 25 q-22 0 -22 25 v17 q0 31 -26 31"/>
